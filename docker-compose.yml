services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: warrant-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Warrant@2025"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    restart: unless-stopped

volumes:
  sqlserver_data:
